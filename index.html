<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>LSRegistry CRF Tool</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.css"
    />
    <style>
      /* 初期ローディング画面のスタイル */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(135deg, #0e1117 0%, #161a24 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: white;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: #00f2fe;
        animation: spin 1s ease-in-out infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-title {
        font-size: 24px;
        font-weight: 700;
        margin-top: 20px;
        background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .loading-desc {
        font-size: 14px;
        color: #8b9bb4;
        margin-top: 10px;
        max-width: 400px;
        text-align: center;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <!-- Streamlitのマウント先 -->
    <div id="root">
      <!-- ローディング画面 (マウント時に自動的に上書き消去されます) -->
      <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-title">LSRegistry CRF Tool</div>
        <div id="loading-desc" class="loading-desc">
          ブラウザ上でPython環境を起動しています...<br>
          (初回起動時はライブラリのダウンロードに10〜30秒程度かかります)
        </div>
        <!-- エラー詳細表示エリア -->
        <div id="error-display" style="display:none; margin-top:20px; padding:15px; background:rgba(255, 75, 75, 0.15); border:1px solid #ff4b2b; border-radius:8px; max-width:600px; color:#ff4b2b; font-family:monospace; font-size:12px; white-space:pre-wrap; text-align:left;"></div>
      </div>
    </div>

    <script>
      // グローバルJSエラーハンドラ
      window.onerror = function(message, source, lineno, colno, error) {
        const errDiv = document.getElementById("error-display");
        const descDiv = document.getElementById("loading-desc");
        if (errDiv) {
          errDiv.style.display = "block";
          errDiv.innerText = "JavaScriptエラーが発生しました:\n" + message + "\n\nSource: " + source + ":" + lineno + ":" + colno + (error ? "\nStack: " + error.stack : "");
        }
        if (descDiv) {
          descDiv.innerHTML = "<span style='color:#ff4b2b; font-weight:bold;'>起動エラー</span>";
        }
        return false;
      };
    </script>

          bytes[i] = binaryString.charCodeAt(i);
        }
        return bytes;

          "app.py": "import streamlit as st\nimport pandas as pd\n\n# stlite (Pyodide Wasm) \u74b0\u5883\u3067\u306e pyarrow \u4e92\u63db\u6027\u30d1\u30c3\u30c1\n# plotly.express\u306fDataFrame\u3092\u6e21\u3059\u3068narwhals\u7d4c\u7531\u3067pyarrow.ChunkedArray\u3092\u8981\u6c42\u3059\u308b\u305f\u3081\n# \u5168\u30c1\u30e3\u30fc\u30c8\u306fgo.Figure\u3067\u751f\u30c7\u30fc\u30bf(list)\u3092\u4f7f\u7528\u3057\u3001narwhals\u3092\u5b8c\u5168\u56de\u907f\u3059\u308b\ntry:\n    import pyarrow as pa\n    if not hasattr(pa, 'ChunkedArray'):\n        class _DummyChunkedArray: pass\n        pa.ChunkedArray = _DummyChunkedArray\n    if not hasattr(pa, 'Table'):\n        class _DummyTable: pass\n        pa.Table = _DummyTable\nexcept Exception:\n    pass\n\nimport plotly.graph_objects as go\nimport io\nimport os\nfrom parser import combine_multiple_files\nfrom validator import check_crf_errors\n\ndef clean_df_for_streamlit(df):\n    if df is None or df.empty:\n        return df\n    df_clean = df.copy()\n    for col in df_clean.columns:\n        if pd.api.types.is_string_dtype(df_clean[col]):\n            df_clean[col] = df_clean[col].astype(object)\n    return df_clean\n\n\n# --- \u30da\u30fc\u30b8\u8a2d\u5b9a ---\nst.set_page_config(\n    page_title=\"CRF Data Integrator & Validator\",\n    page_icon=\"\ud83e\uddec\",\n    layout=\"wide\",\n    initial_sidebar_state=\"expanded\"\n)\n\n# --- \u30ab\u30b9\u30bf\u30e0CSS\u306b\u3088\u308b\u30ea\u30c3\u30c1\u30c7\u30b6\u30a4\u30f3\u306e\u9069\u7528 ---\nst.markdown(\"\"\"\n<style>\n    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');\n    \n    /* \u30d5\u30a9\u30f3\u30c8\u9069\u7528 */\n    html, body, [class*=\"css\"], .stMarkdown {\n        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n    }\n    \n    /* \u30e1\u30a4\u30f3\u80cc\u666f\u3068\u30b5\u30a4\u30c9\u30d0\u30fc */\n    .stApp {\n        background: linear-gradient(135deg, #0e1117 0%, #161a24 100%);\n    }\n    \n    /* \u30ab\u30fc\u30c9\u30c7\u30b6\u30a4\u30f3 (Glassmorphism) */\n    div[data-testid=\"stMetricValue\"] {\n        font-size: 2.2rem !important;\n        font-weight: 700 !important;\n        color: #00f2fe !important;\n    }\n    div[data-testid=\"stMetricLabel\"] {\n        font-size: 1rem !important;\n        font-weight: 500 !important;\n        color: #a3b8cc !important;\n    }\n    \n    /* \u30ab\u30b9\u30bf\u30e0\u30ab\u30fc\u30c9\u30b3\u30f3\u30c6\u30ca */\n    .custom-card {\n        background: rgba(255, 255, 255, 0.03);\n        border: 1px solid rgba(255, 255, 255, 0.08);\n        border-radius: 16px;\n        padding: 20px;\n        backdrop-filter: blur(12px);\n        -webkit-backdrop-filter: blur(12px);\n        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);\n        margin-bottom: 20px;\n        transition: all 0.3s ease;\n    }\n    \n    .custom-card:hover {\n        transform: translateY(-4px);\n        border-color: rgba(0, 242, 254, 0.3);\n        box-shadow: 0 12px 40px 0 rgba(0, 242, 254, 0.1);\n    }\n    \n    /* \u30bf\u30a4\u30c8\u30eb\u30b0\u30e9\u30c7\u30fc\u30b7\u30e7\u30f3 */\n    .title-gradient {\n        background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);\n        -webkit-background-clip: text;\n        -webkit-text-fill-color: transparent;\n        font-weight: 800;\n        font-size: 3rem;\n        margin-bottom: 5px;\n    }\n    \n    .subtitle {\n        color: #8b9bb4;\n        font-size: 1.1rem;\n        margin-bottom: 30px;\n    }\n    \n    /* \u30bf\u30d6\u30b9\u30bf\u30a4\u30eb */\n    .stTabs [data-baseweb=\"tab-list\"] {\n        gap: 10px;\n        background-color: rgba(255, 255, 255, 0.02);\n        padding: 8px;\n        border-radius: 12px;\n        border: 1px solid rgba(255, 255, 255, 0.05);\n    }\n    \n    .stTabs [data-baseweb=\"tab\"] {\n        height: 45px;\n        border-radius: 8px;\n        background-color: transparent;\n        border: none;\n        color: #8b9bb4;\n        font-weight: 600;\n        font-size: 0.95rem;\n        transition: all 0.2s ease;\n    }\n    \n    .stTabs [data-baseweb=\"tab\"]:hover {\n        color: #00f2fe;\n        background-color: rgba(255, 255, 255, 0.05);\n    }\n    \n    .stTabs [aria-selected=\"true\"] {\n        background-color: rgba(0, 242, 254, 0.15) !important;\n        color: #00f2fe !important;\n        border: 1px solid rgba(0, 242, 254, 0.3) !important;\n    }\n    \n    /* \u30c6\u30fc\u30d6\u30eb\u30d8\u30c3\u30c0\u30fc\u3068\u5168\u4f53\u306e\u30d5\u30a9\u30f3\u30c8\u30b5\u30a4\u30ba\u5fae\u8abf\u6574 */\n    .dataframe {\n        font-size: 0.9rem;\n    }\n    \n    /* \u30a8\u30e9\u30fc\u30a2\u30e9\u30fc\u30c8\u306e\u30b9\u30bf\u30a4\u30eb */\n    .error-count-badge {\n        background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);\n        color: white;\n        padding: 4px 12px;\n        border-radius: 20px;\n        font-weight: 700;\n        font-size: 0.9rem;\n        display: inline-block;\n        margin-left: 10px;\n    }\n    \n    .success-badge {\n        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);\n        color: white;\n        padding: 4px 12px;\n        border-radius: 20px;\n        font-weight: 700;\n        font-size: 0.9rem;\n        display: inline-block;\n        margin-left: 10px;\n    }\n</style>\n\"\"\", unsafe_allow_html=True)\n\n# --- \u30bf\u30a4\u30c8\u30eb\u30d8\u30c3\u30c0\u30fc ---\nst.markdown('<div class=\"title-gradient\">\ud83e\uddec LSRegistry CRF Tool</div>', unsafe_allow_html=True)\nst.markdown('<div class=\"subtitle\">\u8907\u6570\u306e\u75c7\u4f8b\u5831\u544a\u66f8\uff08CRF\uff09\u306e\u81ea\u52d5\u7d50\u5408\u30fb\u53ef\u8996\u5316\u30fb\u77db\u76fe\u30c7\u30fc\u30bf\u306e\u691c\u51fa\u30b7\u30b9\u30c6\u30e0</div>', unsafe_allow_html=True)\n\n# --- \u30bb\u30c3\u30b7\u30e7\u30f3\u30b9\u30c6\u30fc\u30c8\u521d\u671f\u5316 ---\nif \"uploaded_files_cache\" not in st.session_state:\n    st.session_state.uploaded_files_cache = {}\nif \"dfs\" not in st.session_state:\n    st.session_state.dfs = None\nif \"raw_results\" not in st.session_state:\n    st.session_state.raw_results = None\nif \"errors_df\" not in st.session_state:\n    st.session_state.errors_df = None\n\n# --- \u30b5\u30a4\u30c9\u30d0\u30fc\uff1a\u30d5\u30a1\u30a4\u30eb\u30a2\u30c3\u30d7\u30ed\u30fc\u30c0\u30fc ---\nwith st.sidebar:\n    st.markdown(\"### \ud83d\udcc1 CRF\u30d5\u30a1\u30a4\u30eb \u30a2\u30c3\u30d7\u30ed\u30fc\u30c9\")\n    st.markdown(\"\u591a\u6570\u306e\u60a3\u8005\u306eCRF Excel\u30d5\u30a1\u30a4\u30eb\uff08`.xlsx`\uff09\u3092\u9078\u629e\u3057\u3066\u304f\u3060\u3055\u3044\u3002\")\n    \n    uploaded_files = st.file_uploader(\n        \"Excel\u30d5\u30a1\u30a4\u30eb\u3092\u9078\u629e\u3057\u3066\u304f\u3060\u3055\u3044\",\n        type=[\"xlsx\"],\n        accept_multiple_files=True,\n        key=\"uploader\"\n    )\n    \n    # \u30b5\u30f3\u30d7\u30eb\u30c7\u30fc\u30bf\u306e\u30ed\u30fc\u30c9\u30dc\u30bf\u30f3\uff08\u30c7\u30e2\u30fb\u30c6\u30b9\u30c8\u7528\uff09\n    st.markdown(\"---\")\n    st.markdown(\"### \ud83e\uddea \u30c6\u30b9\u30c8\u30fb\u691c\u8a3c\u7528\")\n    load_samples = st.button(\"\u30c7\u30e2\u7528\u30b5\u30f3\u30d7\u30eb\u30c7\u30fc\u30bf\u3092\u30ed\u30fc\u30c9\", use_container_width=True)\n    \n    if load_samples:\n        # \u30ed\u30fc\u30ab\u30eb\u3068Wasm\u74b0\u5883\u4e21\u65b9\u306e\u30d5\u30a1\u30a4\u30eb\u30d1\u30b9\u3092\u8003\u616e\n        sample_paths = {\n            \"\u2605CRF20260210_normal.xlsx\": \"\u2605CRF20260210_normal.xlsx\" if os.path.exists(\"\u2605CRF20260210_normal.xlsx\") else \"sample_normal.xlsx\",\n            \"\u2605CRF20260210_error_male.xlsx\": \"\u2605CRF20260210_error_male.xlsx\" if os.path.exists(\"\u2605CRF20260210_error_male.xlsx\") else \"sample_error_male.xlsx\",\n            \"\u2605CRF20260210_error_female.xlsx\": \"\u2605CRF20260210_error_female.xlsx\" if os.path.exists(\"\u2605CRF20260210_error_female.xlsx\") else \"sample_error_female.xlsx\"\n        }\n        \n        # \u30d5\u30a1\u30a4\u30eb\u304c\u5b58\u5728\u3059\u308b\u304b\u78ba\u8a8d\n        samples_exist = True\n        for path in sample_paths.values():\n            if not os.path.exists(path):\n                samples_exist = False\n                break\n                \n        if samples_exist:\n            st.session_state.uploaded_files_cache = sample_paths\n            with st.spinner(\"\u30b5\u30f3\u30d7\u30eb\u30c7\u30fc\u30bf\u3092\u89e3\u6790\u4e2d...\"):\n                dfs, raw_results = combine_multiple_files(sample_paths)\n                st.session_state.dfs = dfs\n                st.session_state.raw_results = raw_results\n                st.session_state.errors_df = check_crf_errors(raw_results)\n            st.success(\"\u30c7\u30e2\u7528\u30c7\u30fc\u30bf\u3092\u30ed\u30fc\u30c9\u3057\u307e\u3057\u305f\uff01\")\n            st.rerun()\n        else:\n            st.error(\"\u30c6\u30b9\u30c8\u7528\u30d5\u30a1\u30a4\u30eb\u304c\u898b\u3064\u304b\u308a\u307e\u305b\u3093\u3002\u30d7\u30ed\u30b8\u30a7\u30af\u30c8\u306e\u30eb\u30fc\u30c8\u30c7\u30a3\u30ec\u30af\u30c8\u30ea\u306b\u30d5\u30a1\u30a4\u30eb\u3092\u751f\u6210\u3057\u3066\u304f\u3060\u3055\u3044\u3002\")\n\n# \u30d5\u30a1\u30a4\u30eb\u304c\u624b\u52d5\u3067\u30a2\u30c3\u30d7\u30ed\u30fc\u30c9\u3055\u308c\u305f\u5834\u5408\u306e\u51e6\u7406\nif uploaded_files:\n    # \u65b0\u3057\u3044\u30a2\u30c3\u30d7\u30ed\u30fc\u30c9\u30d5\u30a1\u30a4\u30eb\u3092\u8f9e\u66f8\u306b\u5909\u63db\n    new_files = {}\n    for f in uploaded_files:\n        new_files[f.name] = f\n        \n    # \u30bb\u30c3\u30b7\u30e7\u30f3\u30b9\u30c6\u30fc\u30c8\u306b\u4fdd\u5b58\n    st.session_state.uploaded_files_cache = new_files\n    \n    # \u30c7\u30fc\u30bf\u306e\u7d50\u5408\u51e6\u7406\n    with st.spinner(\"\u30a2\u30c3\u30d7\u30ed\u30fc\u30c9\u3055\u308c\u305fCRF\u30d5\u30a1\u30a4\u30eb\u3092\u89e3\u6790\u30fb\u7d50\u5408\u4e2d...\"):\n        dfs, raw_results = combine_multiple_files(new_files)\n        st.session_state.dfs = dfs\n        st.session_state.raw_results = raw_results\n        st.session_state.errors_df = check_crf_errors(raw_results)\n\n# --- \u30e1\u30a4\u30f3\u30b3\u30f3\u30c6\u30f3\u30c4\u9818\u57df ---\nif not st.session_state.uploaded_files_cache:\n    st.info(\"\ud83d\udc48 \u5de6\u5074\u306e\u30b5\u30a4\u30c9\u30d0\u30fc\u304b\u3089CRF Excel\u30d5\u30a1\u30a4\u30eb\u3092\u30a2\u30c3\u30d7\u30ed\u30fc\u30c9\u3059\u308b\u304b\u3001\u30c7\u30e2\u7528\u30b5\u30f3\u30d7\u30eb\u30c7\u30fc\u30bf\u3092\u30ed\u30fc\u30c9\u3057\u3066\u304f\u3060\u3055\u3044\u3002\")\n    \n    # \u30d7\u30ec\u30fc\u30b9\u30db\u30eb\u30c0\u30fc\u30c7\u30b6\u30a4\u30f3\u3092\u8868\u793a\n    st.markdown(\"\"\"\n    <div style=\"background: rgba(255, 255, 255, 0.02); border: 1px dashed rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 60px; text-align: center; margin-top: 40px;\">\n        <h3 style=\"color: #8b9bb4; font-weight: 500;\">\u30d5\u30a1\u30a4\u30eb\u3092\u30ed\u30fc\u30c9\u3059\u308b\u3068\u3001\u3053\u3053\u306b\u30c0\u30c3\u30b7\u30e5\u30dc\u30fc\u30c9\u3068\u7d50\u5408\u7d50\u679c\u304c\u8868\u793a\u3055\u308c\u307e\u3059</h3>\n        <p style=\"color: #5f6e85;\">Excel\u30d5\u30a1\u30a4\u30eb\u306e\u5404\u30b7\u30fc\u30c8\uff08\u767b\u9332\u7968\u3001\u767b\u9332\u6642\u60c5\u5831\u3001\u5bb6\u7cfb\u60c5\u5831\u3001\u30b5\u30fc\u30d9\u30a4\u30e9\u30f3\u30b9\u7b49\uff09\u3092\u81ea\u52d5\u7684\u306b\u30d1\u30fc\u30b9\u3057\u3001\u30a8\u30e9\u30fc\u306e\u62bd\u51fa\u3092\u884c\u3044\u307e\u3059\u3002</p>\n    </div>\n    \"\"\", unsafe_allow_html=True)\nelse:\n    dfs = st.session_state.dfs\n    errors_df = st.session_state.errors_df\n    num_files = len(st.session_state.uploaded_files_cache)\n    num_errors = len(errors_df)\n    \n    # \u30bf\u30d6\u306e\u4f5c\u6210\n    tab_dashboard, tab_combine, tab_errors = st.tabs([\n        \"\ud83d\udcca \u53ef\u8996\u5316\u30c0\u30c3\u30b7\u30e5\u30dc\u30fc\u30c9\",\n        \"\ud83d\udcc1 \u7d50\u5408\u30c7\u30fc\u30bf\u306e\u8868\u793a\u30fb\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\",\n        f\"\u26a0\ufe0f \u30a8\u30e9\u30fc\u30fb\u77db\u76fe\u30c7\u30fc\u30bf\u306e\u691c\u8a3c ({num_errors})\"\n    ])\n    \n    # ==========================================\n    # \u30bf\u30d61: \u53ef\u8996\u5316\u30c0\u30c3\u30b7\u30e5\u30dc\u30fc\u30c9\n    # ==========================================\n    with tab_dashboard:\n        # 1. \u30e1\u30c8\u30ea\u30af\u30b9\u30ab\u30fc\u30c9\n        st.markdown(\"### \ud83d\udcca \u4e3b\u8981\u30a4\u30f3\u30b8\u30b1\u30fc\u30bf\")\n        col_m1, col_m2, col_m3, col_m4 = st.columns(4)\n        \n        # \u60a3\u8005\u6570\u8a08\u7b97\n        num_patients = 0\n        if dfs and \"\u767b\u9332\u7968\" in dfs and not dfs[\"\u767b\u9332\u7968\"].empty:\n            num_patients = dfs[\"\u767b\u9332\u7968\"][\"\u30ab\u30eb\u30c6\u756a\u53f7\"].nunique()\n            \n        # \u6027\u5225\u6bd4\u8a08\u7b97\n        male_pct, female_pct = 0.0, 0.0\n        if dfs and \"\u767b\u9332\u7968\" in dfs and not dfs[\"\u767b\u9332\u7968\"].empty and \"\u6027\u5225\" in dfs[\"\u767b\u9332\u7968\"].columns:\n            gender_counts = dfs[\"\u767b\u9332\u7968\"][\"\u6027\u5225\"].value_counts()\n            total_gender = gender_counts.sum()\n            if total_gender > 0:\n                male_pct = (gender_counts.get(\"\u7537\", 0) / total_gender) * 100\n                female_pct = (gender_counts.get(\"\u5973\", 0) / total_gender) * 100\n                \n        # \u5e73\u5747\u5e74\u9f62\n        avg_age_str = \"N/A\"\n        if dfs and \"\u767b\u9332\u6642\u60c5\u5831_\u57fa\u672c\" in dfs and not dfs[\"\u767b\u9332\u6642\u60c5\u5831_\u57fa\u672c\"].empty:\n            # \u767b\u9332\u7968\u304b\u3089\u767b\u9332\u6642\u5e74\u9f62\uff08\u300c50\u6b734\u30f6\u6708\u300d\u306a\u3069\uff09\u3092\u53d6\u5f97\u3059\u308b\u304b\u3001\u8a08\u7b97\u3059\u308b\n            # \u3053\u3053\u3067\u306f\u767b\u9332\u7968\u306b\u300c\u767b\u9332\u6642\u5e74\u9f62\uff0816\u6b73\u4ee5\u4e0a\uff09\u300d\u304c\u3042\u308b\u3002\n            # \u300c50\u6b734\u30f6\u6708\u300d\u306a\u3069\u306e\u6587\u5b57\u5217\u304b\u3089\u6570\u5024\u306b\u3059\u308b\u7c21\u6613\u30d1\u30fc\u30b9\n            ages = []\n            age_col = [col for col in dfs[\"\u767b\u9332\u7968\"].columns if \"\u5e74\u9f62\" in col]\n            if age_col:\n                for a_val in dfs[\"\u767b\u9332\u7968\"][age_col[0]]:\n                    if pd.notna(a_val):\n                        try:\n                            # \u300c50\u6b734\u30f6\u6708\u300d\u306a\u3069\u306e\u6700\u521d\u306e\u6570\u5024\u3092\u62bd\u51fa\n                            import re\n                            match = re.search(r'(\\d+)', str(a_val))\n                            if match:\n                                ages.append(int(match.group(1)))\n                        except:\n                            pass\n            if ages:\n                avg_age_str = f\"{sum(ages)/len(ages):.1f} \u6b73\"\n\n        with col_m1:\n            st.markdown(f\"\"\"\n            <div class=\"custom-card\">\n                <div style=\"font-size: 0.9rem; color: #a3b8cc; font-weight: 500;\">\u89e3\u6790\u3057\u305fCRF\u30d5\u30a1\u30a4\u30eb\u6570</div>\n                <div style=\"font-size: 2.2rem; font-weight: 700; color: #00f2fe; margin-top: 10px;\">{num_files}</div>\n            </div>\n            \"\"\", unsafe_allow_html=True)\n            \n        with col_m2:\n            st.markdown(f\"\"\"\n            <div class=\"custom-card\">\n                <div style=\"font-size: 0.9rem; color: #a3b8cc; font-weight: 500;\">\u767b\u9332\u60a3\u8005\u6570</div>\n                <div style=\"font-size: 2.2rem; font-weight: 700; color: #38ef7d; margin-top: 10px;\">{num_patients}</div>\n            </div>\n            \"\"\", unsafe_allow_html=True)\n            \n        with col_m3:\n            st.markdown(f\"\"\"\n            <div class=\"custom-card\">\n                <div style=\"font-size: 0.9rem; color: #a3b8cc; font-weight: 500;\">\u5e73\u5747\u5e74\u9f62</div>\n                <div style=\"font-size: 2.2rem; font-weight: 700; color: #fccb90; margin-top: 10px;\">{avg_age_str}</div>\n            </div>\n            \"\"\", unsafe_allow_html=True)\n            \n        with col_m4:\n            color = \"#ff4b2b\" if num_errors > 0 else \"#38ef7d\"\n            st.markdown(f\"\"\"\n            <div class=\"custom-card\">\n                <div style=\"font-size: 0.9rem; color: #a3b8cc; font-weight: 500;\">\u691c\u51fa\u3055\u308c\u305f\u30a8\u30e9\u30fc\u6570</div>\n                <div style=\"font-size: 2.2rem; font-weight: 700; color: {color}; margin-top: 10px;\">{num_errors}</div>\n            </div>\n            \"\"\", unsafe_allow_html=True)\n\n        st.markdown(\"### \ud83d\udcc8 \u30c1\u30e3\u30fc\u30c8\u5206\u6790\")\n        \n        # \u30b0\u30e9\u30d5\u7528\u306e\u30ab\u30e9\u30e0\n        col_g1, col_g2 = st.columns(2)\n        \n        # \u30b0\u30e9\u30d51: \u6027\u5225\u306e\u5272\u5408\n        with col_g1:\n            st.markdown('<div class=\"custom-card\">', unsafe_allow_html=True)\n            st.markdown(\"#### \ud83e\uddec \u6027\u5225\u5272\u5408\")\n            if dfs and \"\u767b\u9332\u7968\" in dfs and not dfs[\"\u767b\u9332\u7968\"].empty and \"\u6027\u5225\" in dfs[\"\u767b\u9332\u7968\"].columns:\n                gender_counts = dfs[\"\u767b\u9332\u7968\"][\"\u6027\u5225\"].value_counts()\n                labels = [str(x) for x in gender_counts.index.tolist()]\n                values = [int(x) for x in gender_counts.values.tolist()]\n                colors = [\"#e0c3fc\", \"#8ec5fc\", \"#ffd1ff\", \"#ff9a9e\"]\n                fig_gender = go.Figure(go.Pie(\n                    labels=labels,\n                    values=values,\n                    hole=0.4,\n                    marker=dict(colors=colors[:len(labels)])\n                ))\n                fig_gender.update_layout(\n                    paper_bgcolor=\"rgba(0,0,0,0)\",\n                    plot_bgcolor=\"rgba(0,0,0,0)\",\n                    margin=dict(t=10, b=10, l=10, r=10),\n                    height=300,\n                    template=\"plotly_dark\"\n                )\n                st.plotly_chart(fig_gender, use_container_width=True)\n            else:\n                st.write(\"\u6027\u5225\u30c7\u30fc\u30bf\u304c\u3042\u308a\u307e\u305b\u3093\")\n            st.markdown('</div>', unsafe_allow_html=True)\n            \n        # \u30b0\u30e9\u30d52: \u907a\u4f1d\u5b50\u306e\u5206\u5e03\n        with col_g2:\n            st.markdown('<div class=\"custom-card\">', unsafe_allow_html=True)\n            st.markdown(\"#### \ud83e\uddec \u907a\u4f1d\u5b50\u30d0\u30ea\u30a2\u30f3\u30c8\u967d\u6027\u983b\u5ea6\")\n            gene_list = []\n            if dfs and \"\u767b\u9332\u7968\" in dfs and not dfs[\"\u767b\u9332\u7968\"].empty:\n                cols = [c for c in dfs[\"\u767b\u9332\u7968\"].columns if \"\u907a\u4f1d\u5b50\" in c]\n                for col in cols:\n                    gene_list.extend(dfs[\"\u767b\u9332\u7968\"][col].dropna().tolist())\n                    \n            if gene_list:\n                gene_counts = pd.Series(gene_list).value_counts()\n                x_vals = [str(x) for x in gene_counts.index.tolist()]\n                y_vals = [int(x) for x in gene_counts.values.tolist()]\n                bar_colors = [\"#8ec5fc\", \"#e0c3fc\", \"#ffd1ff\", \"#ff9a9e\", \"#a1c4fd\",\n                              \"#fddb92\", \"#d1c4e9\", \"#b2ebf2\"]\n                fig_genes = go.Figure(go.Bar(\n                    x=x_vals,\n                    y=y_vals,\n                    marker=dict(\n                        color=bar_colors[:len(x_vals)],\n                        line=dict(color='rgba(255,255,255,0.1)', width=1)\n                    )\n                ))\n                fig_genes.update_layout(\n                    paper_bgcolor=\"rgba(0,0,0,0)\",\n                    plot_bgcolor=\"rgba(0,0,0,0)\",\n                    margin=dict(t=10, b=10, l=10, r=10),\n                    height=300,\n                    showlegend=False,\n                    template=\"plotly_dark\"\n                )\n                st.plotly_chart(fig_genes, use_container_width=True)\n            else:\n                st.write(\"\u907a\u4f1d\u5b50\u30c7\u30fc\u30bf\u304c\u3042\u308a\u307e\u305b\u3093\")\n            st.markdown('</div>', unsafe_allow_html=True)\n            \n        col_g3, col_g4 = st.columns(2)\n        \n        # \u30b0\u30e9\u30d53: \u6700\u3082\u591a\u3044\u75c5\u540d\n        with col_g3:\n            st.markdown('<div class=\"custom-card\">', unsafe_allow_html=True)\n            st.markdown(\"#### \u816b\u760d\u30fb\u75c5\u540d\u983b\u5ea6\uff08\u4e0a\u4f4d10\u9805\u76ee\uff09\")\n            if dfs and \"\u767b\u9332\u6642\u60c5\u5831_\u8a3a\u65ad\u6cbb\u7642\u6b74\" in dfs and not dfs[\"\u767b\u9332\u6642\u60c5\u5831_\u8a3a\u65ad\u6cbb\u7642\u6b74\"].empty:\n                diag_counts = dfs[\"\u767b\u9332\u6642\u60c5\u5831_\u8a3a\u65ad\u6cbb\u7642\u6b74\"][\"\u75c5\u540d\"].value_counts().head(10)\n                y_vals = [str(x) for x in diag_counts.index.tolist()]\n                x_vals = [int(x) for x in diag_counts.values.tolist()]\n                # \u6570\u5024\u306b\u5fdc\u3058\u305f\u30b0\u30e9\u30c7\u30fc\u30b7\u30e7\u30f3\u30ab\u30e9\u30fc\n                max_v = max(x_vals) if x_vals else 1\n                grad_colors = [f\"rgba({int(160 + 80*v/max_v)}, {int(100 + 80*(1-v/max_v))}, 220, 0.85)\"\n                               for v in x_vals]\n                fig_diag = go.Figure(go.Bar(\n                    y=y_vals,\n                    x=x_vals,\n                    orientation='h',\n                    marker=dict(color=grad_colors)\n                ))\n                fig_diag.update_layout(\n                    paper_bgcolor=\"rgba(0,0,0,0)\",\n                    plot_bgcolor=\"rgba(0,0,0,0)\",\n                    margin=dict(t=10, b=10, l=10, r=10),\n                    height=320,\n                    template=\"plotly_dark\"\n                )\n                st.plotly_chart(fig_diag, use_container_width=True)\n            else:\n                st.write(\"\u8a3a\u65ad\u6b74\u30c7\u30fc\u30bf\u304c\u3042\u308a\u307e\u305b\u3093\")\n            st.markdown('</div>', unsafe_allow_html=True)\n\n        # \u30b0\u30e9\u30d54: \u533b\u7642\u6a5f\u95a2\u3054\u3068\u306e\u767b\u9332\u6570\n        with col_g4:\n            st.markdown('<div class=\"custom-card\">', unsafe_allow_html=True)\n            st.markdown(\"#### \u75c5\u9662\u30fb\u533b\u7642\u6a5f\u95a2\u5225 \u767b\u9332\u5272\u5408\")\n            hosp_col = []\n            if dfs and \"\u767b\u9332\u7968\" in dfs and not dfs[\"\u767b\u9332\u7968\"].empty:\n                hosp_col = [c for c in dfs[\"\u767b\u9332\u7968\"].columns if \"\u767b\u9332\u533b\u7642\u6a5f\u95a2\" in c]\n                \n            if hosp_col:\n                hosp_counts = dfs[\"\u767b\u9332\u7968\"][hosp_col[0]].value_counts()\n                hosp_labels = [str(x) for x in hosp_counts.index.tolist()]\n                hosp_values = [int(x) for x in hosp_counts.values.tolist()]\n                hosp_colors = [\"#f7971e\", \"#ffd200\", \"#e96c5e\", \"#a18cd1\",\n                               \"#fbc2eb\", \"#84fab0\", \"#8fd3f4\", \"#d4fc79\"]\n                fig_hosp = go.Figure(go.Pie(\n                    labels=hosp_labels,\n                    values=hosp_values,\n                    marker=dict(colors=hosp_colors[:len(hosp_labels)])\n                ))\n                fig_hosp.update_layout(\n                    paper_bgcolor=\"rgba(0,0,0,0)\",\n                    plot_bgcolor=\"rgba(0,0,0,0)\",\n                    margin=dict(t=10, b=10, l=10, r=10),\n                    height=320,\n                    template=\"plotly_dark\"\n                )\n                st.plotly_chart(fig_hosp, use_container_width=True)\n            else:\n                st.write(\"\u533b\u7642\u6a5f\u95a2\u30c7\u30fc\u30bf\u304c\u3042\u308a\u307e\u305b\u3093\")\n            st.markdown('</div>', unsafe_allow_html=True)\n\n    # ==========================================\n    # \u30bf\u30d62: \u7d50\u5408\u30c7\u30fc\u30bf\u306e\u8868\u793a\u30fb\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\n    # ==========================================\n    with tab_combine:\n        st.markdown(\"### \ud83d\udcc2 \u7d50\u5408\u30c7\u30fc\u30bf \u30d7\u30ec\u30d3\u30e5\u30fc\")\n        st.write(\"\u30b7\u30fc\u30c8\u3092\u9078\u629e\u3057\u3066\u3001\u7d50\u5408\u3055\u308c\u305f\u5168\u60a3\u8005\u306e\u30c7\u30fc\u30bf\u3092\u78ba\u8a8d\u3067\u304d\u307e\u3059\u3002\")\n        \n        # \u30d7\u30ec\u30d3\u30e5\u30fc\u7528\u306e\u30b7\u30fc\u30c8\u9078\u629e\n        sheets = list(dfs.keys())\n        selected_sheet = st.selectbox(\"\u7d50\u5408\u30b7\u30fc\u30c8\u306e\u5207\u308a\u66ff\u3048\", sheets)\n        \n        if selected_sheet and not dfs[selected_sheet].empty:\n            st.dataframe(clean_df_for_streamlit(dfs[selected_sheet]), use_container_width=True)\n        else:\n            st.warning(f\"\u30b7\u30fc\u30c8\u300c{selected_sheet}\u300d\u306b\u306f\u30c7\u30fc\u30bf\u304c\u5b58\u5728\u3057\u306a\u3044\u304b\u3001\u7a7a\u3067\u3059\u3002\")\n            \n        st.markdown(\"---\")\n        st.markdown(\"### \ud83d\udce5 \u5168\u7d50\u5408\u30c7\u30fc\u30bf\u306e\u4e00\u62ec\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\")\n        st.write(\"\u30a2\u30c3\u30d7\u30ed\u30fc\u30c9\u3055\u308c\u305f\u3059\u3079\u3066\u306eCRF Excel\u30d5\u30a1\u30a4\u30eb\u3092\u30d1\u30fc\u30b9\u3057\u3001\u30b7\u30fc\u30c8\u3054\u3068\u306b\u7d50\u5408\u3057\u305f\u5358\u4e00\u306eExcel\u30ef\u30fc\u30af\u30d6\u30c3\u30af\u3092\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\u3067\u304d\u307e\u3059\u3002\")\n        \n        # Excel\u30d5\u30a1\u30a4\u30eb\u306e\u30d0\u30a4\u30c8\u30c7\u30fc\u30bf\u3092\u30e1\u30e2\u30ea\u4e0a\u3067\u751f\u6210\n        output_excel = io.BytesIO()\n        with pd.ExcelWriter(output_excel, engine='openpyxl') as writer:\n            for s_name, s_df in dfs.items():\n                if not s_df.empty:\n                    s_df.to_excel(writer, sheet_name=s_name, index=False)\n        excel_data = output_excel.getvalue()\n        \n        # \u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\u30dc\u30bf\u30f3\n        st.download_button(\n            label=\"\ud83d\udce5 \u7d50\u5408\u30c7\u30fc\u30bf\u3092Excel\u3067\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\",\n            data=excel_data,\n            file_name=\"combined_crf_data.xlsx\",\n            mime=\"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet\",\n            use_container_width=True\n        )\n\n    # ==========================================\n    # \u30bf\u30d63: \u30a8\u30e9\u30fc\u30fb\u77db\u76fe\u30c7\u30fc\u30bf\u306e\u691c\u8a3c\n    # ==========================================\n    with tab_errors:\n        st.markdown(\"### \u26a0\ufe0f \u8fbb\u8904\u306e\u5408\u308f\u306a\u3044\u30c7\u30fc\u30bf\u306e\u691c\u51fa\")\n        st.write(\"\u6027\u5225\u3068\u75be\u60a3\u306e\u77db\u76fe\uff08\u7537\u6027\u306e\u5375\u5de3\u304c\u3093\u30fb\u5b50\u5bae\u304c\u3093\u3001\u5973\u6027\u306e\u524d\u7acb\u817a\u304c\u3093\u7b49\uff09\u3084\u3001\u5bb6\u7cfb\u60c5\u5831\u3001\u691c\u67fb\u7b49\u306e\u77db\u76fe\u30c7\u30fc\u30bf\u3092\u81ea\u52d5\u62bd\u51fa\u3057\u3066\u3044\u307e\u3059\u3002\")\n        \n        if num_errors > 0:\n            st.markdown(f'<div class=\"error-count-badge\">\u26a0\ufe0f {num_errors} \u4ef6\u306e\u77db\u76fe\u3092\u691c\u51fa</div>', unsafe_allow_html=True)\n            st.markdown(\"<br><br>\", unsafe_allow_html=True)\n            \n            # \u30a8\u30e9\u30fc\u306e\u30d5\u30a3\u30eb\u30bf\u30ea\u30f3\u30b0\u30aa\u30d7\u30b7\u30e7\u30f3\n            categories = [\"\u3059\u3079\u3066\"] + list(errors_df[\"\u30a8\u30e9\u30fc\u306e\u5206\u985e\"].unique())\n            selected_cat = st.selectbox(\"\u30a8\u30e9\u30fc\u5206\u985e\u3067\u30d5\u30a3\u30eb\u30bf\", categories)\n            \n            filtered_errors = errors_df\n            if selected_cat != \"\u3059\u3079\u3066\":\n                filtered_errors = errors_df[errors_df[\"\u30a8\u30e9\u30fc\u306e\u5206\u985e\"] == selected_cat]\n                \n            # \u30a4\u30f3\u30bf\u30e9\u30af\u30c6\u30a3\u30d6\u30c6\u30fc\u30d6\u30eb\u3067\u306e\u30a8\u30e9\u30fc\u8868\u793a\n            st.dataframe(\n                clean_df_for_streamlit(filtered_errors),\n                column_config={\n                    \"\u30d5\u30a1\u30a4\u30eb\u540d\": st.column_config.TextColumn(\"\u30d5\u30a1\u30a4\u30eb\u540d\", width=\"medium\"),\n                    \"\u30ab\u30eb\u30c6\u756a\u53f7\": st.column_config.TextColumn(\"\u30ab\u30eb\u30c6\u756a\u53f7\", width=\"small\"),\n                    \"\u30a8\u30e9\u30fc\u306e\u5206\u985e\": st.column_config.TextColumn(\"\u5206\u985e\", width=\"small\"),\n                    \"\u9805\u76ee/\u5bfe\u8c61\": st.column_config.TextColumn(\"\u5bfe\u8c61\", width=\"medium\"),\n                    \"\u691c\u51fa\u3055\u308c\u305f\u5024\": st.column_config.TextColumn(\"\u691c\u51fa\u5024\", width=\"medium\"),\n                    \"\u30a8\u30e9\u30fc\u30e1\u30c3\u30bb\u30fc\u30b8\": st.column_config.TextColumn(\"\u8aac\u660e\", width=\"large\"),\n                },\n                use_container_width=True,\n                hide_index=True\n            )\n            \n            # \u30a8\u30e9\u30fc\u30c7\u30fc\u30bf\u306e\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\n            st.markdown(\"#### \ud83d\udce5 \u30a8\u30e9\u30fc\u30ea\u30b9\u30c8\u306e\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\")\n            \n            col_dl1, col_dl2 = st.columns(2)\n            with col_dl1:\n                # CSV\u5f62\u5f0f\n                csv_errors = filtered_errors.to_csv(index=False).encode('utf-8-sig')\n                st.download_button(\n                    label=\"\ud83d\udce5 \u30a8\u30e9\u30fc\u30ea\u30b9\u30c8\u3092CSV\u3067\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\",\n                    data=csv_errors,\n                    file_name=\"crf_validation_errors.csv\",\n                    mime=\"text/csv\",\n                    use_container_width=True\n                )\n            with col_dl2:\n                # Excel\u5f62\u5f0f\n                err_output = io.BytesIO()\n                with pd.ExcelWriter(err_output, engine='openpyxl') as writer:\n                    filtered_errors.to_excel(writer, sheet_name=\"Validation Errors\", index=False)\n                err_excel_data = err_output.getvalue()\n                \n                st.download_button(\n                    label=\"\ud83d\udce5 \u30a8\u30e9\u30fc\u30ea\u30b9\u30c8\u3092Excel\u3067\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\",\n                    data=err_excel_data,\n                    file_name=\"crf_validation_errors.xlsx\",\n                    mime=\"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet\",\n                    use_container_width=True\n                )\n                \n        else:\n            st.markdown('<div class=\"success-badge\">\u2705 \u4e0d\u6574\u5408\u306a\u3057</div>', unsafe_allow_html=True)\n            st.markdown(\"<br><br>\", unsafe_allow_html=True)\n            st.success(\"\ud83c\udf89 \u7d20\u6674\u3089\u3057\u3044\uff01\u77db\u76fe\u30c7\u30fc\u30bf\u3084\u4e0d\u6574\u5408\u306f\u4e00\u5207\u691c\u51fa\u3055\u308c\u307e\u305b\u3093\u3067\u3057\u305f\u3002\u3059\u3079\u3066\u306e\u30c7\u30fc\u30bf\u306e\u8fbb\u8904\u304c\u5408\u3063\u3066\u3044\u307e\u3059\u3002\")\n            st.markdown(\"\"\"\n            <div style=\"background: rgba(17, 153, 142, 0.05); border: 1px solid rgba(56, 239, 125, 0.2); border-radius: 16px; padding: 40px; text-align: center; margin-top: 20px;\">\n                <h3 style=\"color: #38ef7d; font-weight: 600;\">Data is Clean!</h3>\n                <p style=\"color: #8b9bb4;\">\u30a2\u30c3\u30d7\u30ed\u30fc\u30c9\u3055\u308c\u305f\u3059\u3079\u3066\u306e\u30c7\u30fc\u30bf\u306f\u6574\u5408\u6027\u304c\u78ba\u8a8d\u3055\u308c\u3001\u81e8\u5e8a\u7814\u7a76\u3078\u306e\u4f7f\u7528\u306b\u9069\u3057\u3066\u3044\u307e\u3059\u3002</p>\n            </div>\n            \"\"\", unsafe_allow_html=True)\n",
          "parser.py": "import os\nimport openpyxl\nimport pandas as pd\nfrom datetime import datetime\n\ndef safe_str(val):\n    if val is None:\n        return \"\"\n    return str(val).strip()\n\ndef parse_single_crf(file_path_or_bytes, filename=\"Unknown\"):\n    \"\"\"\n    1\u3064\u306eExcel\u30d5\u30a1\u30a4\u30eb\u3092\u30d1\u30fc\u30b9\u3057\u3001\u5404\u30b7\u30fc\u30c8\u306e\u30c7\u30fc\u30bf\u3092\u69cb\u9020\u5316\u3057\u305f\u8f9e\u66f8\u3068\u3057\u3066\u8fd4\u3059\u3002\n    \u6570\u5f0f\u306e\u30ad\u30e3\u30c3\u30b7\u30e5\u5024\u304c\u8aad\u307f\u8fbc\u3081\u306a\u3044\u5834\u5408\u306f\u3001\u767b\u9332\u7968\u304b\u3089\u53d6\u5f97\u3057\u305f\u57fa\u672c\u60c5\u5831\u3067\u88dc\u5b8c\u3059\u308b\u3002\n    \"\"\"\n    try:\n        # data_only=True \u3067\u6570\u5f0f\u306e\u8a08\u7b97\u7d50\u679c\u3092\u53d6\u5f97\n        wb = openpyxl.load_workbook(file_path_or_bytes, data_only=True)\n    except Exception as e:\n        print(f\"Error loading workbook {filename}: {e}\")\n        return None\n\n    # --- 1. \u767b\u9332\u7968\u306e\u30d1\u30fc\u30b9 (\u60a3\u8005\u57fa\u672c\u60c5\u5831\u306e\u53d6\u5f97) ---\n    reg_info = {}\n    if \"\u767b\u9332\u7968\" in wb.sheetnames:\n        ws = wb[\"\u767b\u9332\u7968\"]\n        current_category = \"\"\n        for r in range(1, ws.max_row + 1):\n            cat_val = ws.cell(r, 1).value\n            item_val = ws.cell(r, 2).value\n            val = ws.cell(r, 3).value\n            \n            if cat_val is not None:\n                current_category = str(cat_val).strip()\n            \n            if item_val is not None:\n                item_str = str(item_val).strip()\n                key = f\"{current_category}_{item_str}\" if current_category else item_str\n                reg_info[key] = val\n\n    # \u57fa\u672c\u60c5\u5831\u306e\u7279\u5b9a\uff08\u4ed6\u306e\u30b7\u30fc\u30c8\u306e\u88dc\u5b8c\u306b\u4f7f\u7528\uff09\n    # \u30ad\u30fc\u540d\u306f '\u60a3\u8005\u60c5\u5831_\u30ab\u30eb\u30c6\u756a\u53f7' \u3084 '\u60a3\u8005\u60c5\u5831_\u6027\u5225' \u306a\u3069\n    karte_no = None\n    gender = None\n    birth_date = None\n    \n    for k, v in reg_info.items():\n        if \"\u30ab\u30eb\u30c6\u756a\u53f7\" in k:\n            karte_no = safe_str(v)\n        elif \"\u6027\u5225\" in k:\n            gender = safe_str(v)\n        elif \"\u751f\u5e74\u6708\u65e5\" in k:\n            birth_date = v\n\n    if not karte_no:\n        # \u30d5\u30a9\u30fc\u30eb\u30d0\u30c3\u30af: \u30d5\u30a1\u30a4\u30eb\u540d\u304b\u3089\u30ab\u30eb\u30c6\u756a\u53f7\u3092\u63a8\u6e2c\u3059\u308b\u304b\u3001\u30c7\u30d5\u30a9\u30eb\u30c8\u5024\u3092\u8a2d\u5b9a\n        karte_no = f\"K-{filename.replace('.xlsx', '')}\"\n    \n    # \u5168\u4f53\u306e\u8f9e\u66f8\u306b\u57fa\u672c\u60c5\u5831\u3092\u8a2d\u5b9a\n    meta = {\n        \"\u30d5\u30a1\u30a4\u30eb\u540d\": filename,\n        \"\u30ab\u30eb\u30c6\u756a\u53f7\": karte_no,\n        \"\u6027\u5225\": gender,\n        \"\u751f\u5e74\u6708\u65e5\": birth_date\n    }\n\n    # \u767b\u9332\u7968\u306e\u30c7\u30fc\u30bf\u3092\u30d5\u30e9\u30c3\u30c8\u306a\u8f9e\u66f8\u306b\u3059\u308b\n    flat_reg = {**meta}\n    for k, v in reg_info.items():\n        flat_reg[k] = v\n\n    # --- 2. \u767b\u9332\u6642\u60c5\u5831\u306e\u30d1\u30fc\u30b9 (\u8a3a\u65ad\u30fb\u6cbb\u7642\u6b74 \uff0b \u305d\u306e\u4ed6\u57fa\u672c) ---\n    diagnoses = []\n    baseline_info = {**meta}\n    \n    if \"\u767b\u9332\u6642\u60c5\u5831\" in wb.sheetnames:\n        ws = wb[\"\u767b\u9332\u6642\u60c5\u5831\"]\n        \n        # \u8a3a\u65ad\u30fb\u6cbb\u7642\u6b74\u30c6\u30fc\u30d6\u30eb\u306e\u53d6\u5f97\n        # 3\u884c\u76ee\u304b\u3089\u958b\u59cb\u3057\u3001\u6b21\u306e\u30bb\u30af\u30b7\u30e7\u30f3\u304c\u59cb\u307e\u308b\u304b\u7a7a\u884c\u306b\u306a\u308b\u307e\u3067\n        r = 3\n        while r <= ws.max_row:\n            disease = ws.cell(r, 1).value\n            if disease == \"\u5316\u5b66\u4e88\u9632\" or disease is None:\n                break\n            \n            diag = {\n                \"\u30d5\u30a1\u30a4\u30eb\u540d\": filename,\n                \"\u30ab\u30eb\u30c6\u756a\u53f7\": karte_no,\n                \"\u75c5\u540d\": safe_str(disease),\n                \"\u539f\u767a\u90e8\u4f4d\": safe_str(ws.cell(r, 2).value),\n                \"\u30b5\u30d6\u30b5\u30a4\u30c8\": safe_str(ws.cell(r, 3).value),\n                \"\u7d44\u7e54\u578b\": safe_str(ws.cell(r, 4).value),\n                \"\u8a3a\u65ad\u5e74\u9f62\": ws.cell(r, 5).value,\n                \"\u6cbb\u7642\u5185\u5bb9\": safe_str(ws.cell(r, 6).value)\n            }\n            diagnoses.append(diag)\n            r += 1\n\n        # \u305d\u306e\u4ed6\u57fa\u672c\u30bb\u30af\u30b7\u30e7\u30f3\u306e\u30d1\u30fc\u30b9\n        r = 1\n        while r <= ws.max_row:\n            val_a = ws.cell(r, 1).value\n            val_b = ws.cell(r, 2).value\n            val_c = ws.cell(r, 3).value\n            \n            # \u598a\u5a20\u30fb\u51fa\u7523\u60c5\u5831\n            if val_a == \"\u598a\u5a20\u30fb\u51fa\u7523\u60c5\u5831\" and val_b == \"\u598a\u5a20\u56de\u6570\":\n                baseline_info[\"\u598a\u5a20\u56de\u6570\"] = val_c\n            elif val_a is None and val_b == \"\u51fa\u7523\u56de\u6570\":\n                baseline_info[\"\u51fa\u7523\u56de\u6570\"] = val_c\n                \n            # \u8eab\u9577\u30fb\u4f53\u91cd\n            elif val_a == \"\u8eab\u9577\u30fb\u4f53\u91cd\":\n                h_row = r + 2\n                if h_row <= ws.max_row:\n                    baseline_info[\"\u8eab\u9577_cm\"] = ws.cell(h_row, 1).value\n                    baseline_info[\"\u4f53\u91cd_kg\"] = ws.cell(h_row, 2).value\n                    baseline_info[\"BMI\"] = ws.cell(h_row, 3).value\n                    \n            # \u55ab\u7159\u6b74\n            elif val_a == \"\u55ab\u7159\u6b74\":\n                s_row = r + 2\n                if s_row <= ws.max_row:\n                    baseline_info[\"\u55ab\u7159_\u672c\u6570_\u65e5\"] = ws.cell(s_row, 1).value\n                    baseline_info[\"\u55ab\u7159_\u958b\u59cb\u5e74\u9f62\"] = ws.cell(s_row, 2).value\n                    baseline_info[\"\u55ab\u7159_\u7981\u7159\u5e74\u9f62\"] = ws.cell(s_row, 3).value\n                    \n            # \u98f2\u9152\u6b74\n            elif val_a == \"\u98f2\u9152\u6b74\":\n                d_row = r + 1\n                if d_row <= ws.max_row:\n                    baseline_info[\"\u98f2\u9152\u6b74\"] = safe_str(ws.cell(d_row, 1).value)\n                    \n            r += 1\n\n    # --- 3. \u5bb6\u7cfb\u60c5\u5831\u306e\u30d1\u30fc\u30b9 ---\n    family_history = []\n    if \"\u5bb6\u7cfb\u60c5\u5831\" in wb.sheetnames:\n        ws = wb[\"\u5bb6\u7cfb\u60c5\u5831\"]\n        # 2\u5217\u76ee\u4ee5\u964d\u304c\u5404\u5bb6\u65cf\u30e1\u30f3\u30d0\u30fc\n        for col in range(2, ws.max_column + 1):\n            relation = ws.cell(2, col).value\n            if relation is None or safe_str(relation) == \"\u4f8b\":\n                continue\n            \n            f_gender = safe_str(ws.cell(3, col).value)\n            outcome = safe_str(ws.cell(4, col).value)\n            \n            # \u75be\u60a3\uff11\u301c\uff15\n            diseases = []\n            for i in range(5, 15, 2):\n                dis_name = ws.cell(i, col).value\n                dis_age = ws.cell(i+1, col).value\n                if dis_name:\n                    diseases.append({\"\u75c5\u540d\": safe_str(dis_name), \"\u8a3a\u65ad\u5e74\u9f62\": dis_age})\n            \n            family_history.append({\n                \"\u30d5\u30a1\u30a4\u30eb\u540d\": filename,\n                \"\u30ab\u30eb\u30c6\u756a\u53f7\": karte_no,\n                \"\u95a2\u4fc2\": safe_str(relation),\n                \"\u6027\u5225\": f_gender,\n                \"\u8ee2\u5e30\": outcome,\n                \"\u75be\u60a3\u4e00\u89a7\": diseases # \u30a8\u30e9\u30fc\u30c1\u30a7\u30c3\u30af\u7528\u306e\u30ea\u30b9\u30c8\n            })\n\n    # --- 4. \u30b5\u30fc\u30d9\u30a4\u30e9\u30f3\u30b9\u306e\u30d1\u30fc\u30b9 ---\n    surveillances = []\n    if \"\u30b5\u30fc\u30d9\u30a4\u30e9\u30f3\u30b9\" in wb.sheetnames:\n        ws = wb[\"\u30b5\u30fc\u30d9\u30a4\u30e9\u30f3\u30b9\"]\n        # 5\u884c\u76ee\u4ee5\u964d\u304c\u30c7\u30fc\u30bf\n        for r in range(5, ws.max_row + 1):\n            exam_type = ws.cell(r, 1).value\n            exam_date = ws.cell(r, 2).value\n            if exam_type is None and exam_date is None:\n                continue\n            \n            surveillances.append({\n                \"\u30d5\u30a1\u30a4\u30eb\u540d\": filename,\n                \"\u30ab\u30eb\u30c6\u756a\u53f7\": karte_no,\n                \"\u691c\u67fb\u7a2e\u5225\": safe_str(exam_type),\n                \"\u691c\u67fb\u65e5\": exam_date,\n                \"\u691c\u67fb\u6240\u898b\": safe_str(ws.cell(r, 3).value),\n                \"\u78ba\u8a8d\u691c\u67fb\": safe_str(ws.cell(r, 4).value),\n                \"\u78ba\u8a8d\u691c\u67fb\u65e5\": ws.cell(r, 5).value,\n                \"\u75c5\u7406\u8a3a\u65ad\u65b9\u6cd5\": safe_str(ws.cell(r, 6).value),\n                \"ICD10\": safe_str(ws.cell(r, 7).value),\n                \"OncoTree_LV1\": safe_str(ws.cell(r, 8).value),\n                \"OncoTree\": safe_str(ws.cell(r, 9).value),\n                \"\u6cbb\u7642\u5185\u5bb9\": safe_str(ws.cell(r, 10).value),\n                \"\u6cbb\u7642\u5185\u5bb9_\u81ea\u7531\u8a18\u8f09\": safe_str(ws.cell(r, 11).value)\n            })\n\n    # --- 5. \u5316\u5b66\u4e88\u9632\u306e\u30d1\u30fc\u30b9 ---\n    chemoprevention = []\n    if \"\u5316\u5b66\u4e88\u9632\" in wb.sheetnames:\n        ws = wb[\"\u5316\u5b66\u4e88\u9632\"]\n        for r in range(5, ws.max_row + 1):\n            drug_name = ws.cell(r, 2).value\n            start_date = ws.cell(r, 3).value\n            if drug_name is None and start_date is None:\n                continue\n            \n            chemoprevention.append({\n                \"\u30d5\u30a1\u30a4\u30eb\u540d\": filename,\n                \"\u30ab\u30eb\u30c6\u756a\u53f7\": karte_no,\n                \"\u85ac\u5264\u540d\": safe_str(drug_name),\n                \"\u5185\u670d\u958b\u59cb\u65e5\": start_date,\n                \"\u5185\u670d\u7d42\u4e86\u65e5\": ws.cell(r, 4).value,\n                \"\u7d42\u4e86\u7406\u7531\": safe_str(ws.cell(r, 5).value),\n                \"\u6709\u5bb3\u4e8b\u8c61_1\": safe_str(ws.cell(r, 6).value),\n                \"Grade_1\": safe_str(ws.cell(r, 7).value),\n                \"\u6709\u5bb3\u4e8b\u8c61_2\": safe_str(ws.cell(r, 8).value),\n                \"Grade_2\": safe_str(ws.cell(r, 9).value),\n            })\n\n    # --- 6. \u55dc\u597d\u30fb\u751f\u6d3b\u306e\u30d1\u30fc\u30b9 ---\n    lifestyle = {**meta}\n    if \"\u55dc\u597d\u30fb\u751f\u6d3b\" in wb.sheetnames:\n        ws = wb[\"\u55dc\u597d\u30fb\u751f\u6d3b\"]\n        \n        # \u55ab\u7159\u6b74\n        lifestyle[\"\u55ab\u7159\u6b74\"] = safe_str(ws.cell(5, 2).value)\n        lifestyle[\"\u55ab\u7159_\u672c\u6570_\u65e5\"] = ws.cell(5, 3).value\n        lifestyle[\"\u55ab\u7159_\u958b\u59cb\u5e74\u9f62\"] = ws.cell(5, 4).value\n        lifestyle[\"\u55ab\u7159_\u7981\u7159\u5e74\u9f62\"] = ws.cell(5, 5).value\n        \n        # \u98f2\u9152\u6b74\n        lifestyle[\"\u98f2\u9152\u6b74\"] = safe_str(ws.cell(7, 2).value)\n        \n        # \u5a5a\u59fb\u6b74 (\u7d50\u5a5a_1\u301c3)\n        for i, row_idx in enumerate([9, 11, 13], 1):\n            lifestyle[f\"\u7d50\u5a5a_{i}\"] = safe_str(ws.cell(row_idx, 2).value)\n            lifestyle[f\"\u7d50\u5a5a_{i}_\u5e74\u9f62\"] = ws.cell(row_idx, 3).value\n            lifestyle[f\"\u96e2\u5a5a_{i}\"] = safe_str(ws.cell(row_idx, 4).value)\n            lifestyle[f\"\u96e2\u5a5a_{i}_\u5e74\u9f62\"] = ws.cell(row_idx, 5).value\n\n    # --- 7. \u8ee2\u5e30\u30fb\u4e88\u5f8c\u306e\u30d1\u30fc\u30b9 ---\n    prognosis = {**meta}\n    if \"\u8ee2\        continue\n        \n        raw_results.append(parsed)\n        \n        for key in combined_data.keys():\n            if isinstance(parsed[key], list):\n                combined_data[key].extend(parsed[key])\n            elif isinstance(parsed[key], dict):\n                combined_data[key].append(parsed[key])\n\n    # DataFrame \u306b\u5909\u63db\n    dfs = {}\n    for key, val_list in combined_data.items():\n        if val_list:\n            if key == \"\u5bb6\u7cfb\u60c5\u5831\":\n                flat_fam = []\n                for fam in val_list:\n                    fam_copy = {k: v for k, v in fam.items() if k != \"\u75be\u60a3\u4e00\u89a7\"}\n                    dis_strs = [f\"{d['\u75c5\u540d']}({d['\u8a3a\u65ad\u5e74\u9f62']}\u6b73)\" for d in fam[\"\u75be\u60a3\u4e00\u89a7\"]]\n                    fam_copy[\"\u767b\u9332\u75be\u60a3\"] = \", \".join(dis_strs) if dis_strs else \"\u306a\u3057\"\n                    flat_fam.append(fam_copy)\n                dfs[key] = pd.DataFrame(flat_fam)\n            else:\n                dfs[key] = pd.DataFrame(val_list)\n        else:\n            dfs[key] = pd.DataFrame()\n            \n    return dfs, raw_results\n",
          "validator.py": "import pandas as pd\n\n# \u5973\u6027\u7279\u6709\u306e\u75be\u60a3\u306e\u30ad\u30fc\u30ef\u30fc\u30c9\nFEMALE_DISEASES = [\n    \"\u5375\u5de3\u764c\", \"\u5b50\u5bae\u764c\", \"\u5b50\u5bae\u4f53\u764c\", \"\u5b50\u5bae\u9838\u764c\", \"\u5375\u5de3\u56a2\u816b\", \"\u5b50\u5bae\u7b4b\u816b\", \n    \"\u5b50\u5bae\u5185\u819c\u764c\", \"\u5b50\u5bae\u5185\u819c\u5897\u6b96\u75c7\", \"\u5b50\u5bae\u8089\u816b\", \"\u5375\u5de3\u5883\u754c\u60aa\u6027\u816b\u760d\", \n    \"\u5375\u5de3\u306e\u3046\u816b\", \"\u5b50\u5bae\u304c\u3093\", \"\u5375\u5de3\u304c\u3093\", \"\u5b50\u5bae\u5185\u819c\"\n]\n\n# \u7537\u6027\u7279\u6709\u306e\u75be\u60a3\u306e\u30ad\u30fc\u30ef\u30fc\u30c9\nMALE_DISEASES = [\n    \"\u524d\u7acb\u817a\u764c\", \"\u524d\u7acb\u817a\u80a5\u5927\u75c7\", \"\u7cbe\u5de3\u764c\", \"\u524d\u7acb\u817a\u304c\u3093\", \"\u7cbe\u5de3\u304c\u3093\"\n]\n\n# \u5973\u6027\u7279\u6709\u306e\u691c\u67fb\u30fb\u6cbb\u7642\u306e\u30ad\u30fc\u30ef\u30fc\u30c9\nFEMALE_PROCEDURES = [\n    \"\u5b50\u5bae\u5185\u819c\u7d44\u7e54\u8a3a\", \"\u7d4c\u81a3\u8d85\u97f3\u6ce2\u691c\u67fb\", \"\u5b50\u5bae\u5168\u6458\u8853\", \"\u4e21\u5074\u4ed8\u5c5e\u5668\u5207\u9664\u8853\", \"\u4ed8\u5c5e\u5668\u5207\u9664\u8853\"\n]\n\n# \u7537\u6027\u95a2\u4fc2\u8005\u30ad\u30fc\u30ef\u30fc\u30c9\nMALE_RELATIONS = [\"\u7236\", \"\u7956\u7236\", \"\u7236\u65b9\u7956\u7236\", \"\u6bcd\u65b9\u7956\u7236\", \"\u4f2f\u7236\", \"\u53d4\u7236\", \"\u5144\u5f1f\", \"\u606f\u5b50\", \"\u592b\", \"\u53d4\u7236\u30fb\u4f2f\u7236\"]\n# \u5973\u6027\u95a2\u4fc2\u8005\u30ad\u30fc\u30ef\u30fc\u30c9\nFEMALE_RELATIONS = [\"\u6bcd\", \"\u7956\u6bcd\", \"\u7236\u65b9\u7956\u6bcd\", \"\u6bcd\u65b9\u7956\u6bcd\", \"\u4f2f\u6bcd\", \"\u53d4\u6bcd\", \"\u59c9\u59b9\", \"\u5a18\", \"\u59bb\", \"\u53d4\u6bcd\u30fb\u4f2f\u6bcd\"]\n\ndef check_crf_errors(raw_results):\n    \"\"\"\n    \u30d1\u30fc\u30b9\u3055\u308c\u305f\u751f\u306eCRF\u30c7\u30fc\u30bf\u30ea\u30b9\u30c8\u3092\u7cbe\u67fb\u3057\u3001\u4e0d\u6574\u5408\uff08\u30a8\u30e9\u30fc\uff09\u3092\u62bd\u51fa\u3059\u308b\u3002\n    \"\"\"\n    errors = []\n\n    for parsed in raw_results:\n        filename = parsed[\"\u767b\u9332\u7968\"].get(\"\u30d5\u30a1\u30a4\u30eb\u540d\", \"Unknown\")\n        karte_no = parsed[\"\u767b\u9332\u7968\"].get(\"\u30ab\u30eb\u30c6\u756a\u53f7\", \"Unknown\")\n        \n        # \u6027\u5225\u306e\u62bd\u51fa\n        # \u767b\u9332\u7968\u304b\u3089\u6027\u5225\u3092\u53d6\u5f97\uff08\u300c\u5973\u300d\u307e\u305f\u306f\u300c\u7537\u300d\uff09\n        gender_raw = parsed[\"\u767b\u9332\u7968\"].get(\"\u60a3\u8005\u60c5\u5831_\u6027\u5225\", parsed[\"\u767b\u9332\u7968\"].get(\"\u6027\u5225\"))\n        if gender_raw is None:\n            # \u767b\u9332\u7968\u306e\u5225\u30ad\u30fc\u3092\u63a2\u3059\n            for k, v in parsed[\"\u767b\u9332\u7968\"].items():\n                if \"\u6027\u5225\" in k:\n                    gender_raw = v\n                    break\n        \n        gender = str(gender_raw).strip() if gender_raw is not None else \"\"\n        \n        # --- 1. \u672c\u4eba\u306e\u6027\u5225\u3068\u75be\u60a3\u306e\u77db\u76fe\u306e\u30c1\u30a7\u30c3\u30af (\u767b\u9332\u6642\u60c5\u5831_\u8a3a\u65ad\u6cbb\u7642\u6b74) ---\n        diags = parsed.get(\"\u767b\u9332\u6642\u60c5\u5831_\u8a3a\u65ad\u6cbb\u7642\u6b74\", [])\n        for diag in diags:\n            disease = diag.get(\"\u75c5\u540d\", \"\")\n            \n            if gender == \"\u7537\":\n                # \u7537\u6027\u306e\u5973\u6027\u7279\u6709\u75be\u60a3\u30c1\u30a7\u30c3\u30af\n                matched_female_dis = [fd for fd in FEMALE_DISEASES if fd in disease]\n                if matched_female_dis:\n                    errors.append({\n                        \"\u30d5\u30a1\u30a4\u30eb\u540d\": filename,\n                        \"\u30ab\u30eb\u30c6\u756a\u53f7\": karte_no,\n                        \"\u30a8\u30e9\u30fc\u306e\u5206\u985e\": \"\u8a3a\u65ad\u30fb\u6cbb\u7642\u6b74\",\n                        \"\u9805\u76ee/\u5bfe\u8c61\": \"\u6027\u5225\u3068\u75c5\u540d\u306e\u77db\u76fe\",\n                        \"\u691c\u51fa\u3055\u308c\u305f\u5024\": f\"\u6027\u5225: \u7537 / \u75c5\u540d: {disease}\",\n                        \"\u30a8\u30e9\u30fc\u30e1\u30c3\u30bb\u30fc\u30b8\": f\"\u7537\u6027\u60a3\u8005\u306b\u5973\u6027\u7279\u6709\u306e\u75be\u60a3\u300c{disease}\u300d\u304c\u767b\u9332\u3055\u308c\u3066\u3044\u307e\u3059\u3002\"\n                    })\n                    \n            elif gender == \"\u5973\":\n                # \u5973\u6027\u306e\u7537\u6027\u7279\u6709\u75be\u60a3\u30c1\u30a7\u30c3\u30af\n                matched_male_dis = [md for md in MALE_DISEASES if md in disease]\n                if matched_male_dis:\n                    errors.append({\n                        \"\u30d5\u30a1\u30a4\u30eb\u540d\": filename,\n                        \"\u30ab\u30eb\u30c6\u756a\u53f7\": karte_no,\n                        \"\u30a8\u30e9\u30fc\u306e\u5206\u985e\": \"\u8a3a\u65ad\u30fb\u6cbb\u7642\u6b74\",\n                        \"\u9805\u76ee/\u5bfe\u8c61\": \"\u6027\u5225\u3068\u75c5\u540d\u306e\u77db\u76fe\",\n                        \"\u691c\u51fa\u3055\u308c\u305f\u5024\": f\"\u6027\u5225: \u5973 / \u75c5\u540d: {disease}\",\n                        \"\u30a8\u30e9\u30fc\u30e1\u30c3\u30bb\u30fc\u30b8\": f\"\u5973\u6027\u60a3\u8005\u306b\u7537\u6027\u7279\u6709\u306e\u75be\u60a3\u300c{disease}\u300d\u304c\u767b\u9332\u3055\u308c\u3066\u3044\u307e\u3059\u3002\"\n                    })\n\n        # --- 2. \u672c\u4eba\u306e\u6027\u5225\u3068\u598a\u5a20\u30fb\u51fa\u7523\u306e\u77db\u76fe (\u767b\u9332\u6642\u60c5\u5831_\u57fa\u672c) ---\n        baseline = parsed.get(\"\u767b\u9332\u6642\u60c5\u5831_\u57fa\u672c\", {})\n        if gender == \"\u7537\":\n            preg_count = baseline.get(\"\u598a\u5a20\u56de\u6570\")\n            birth_count = baseline.get(\"\u51fa\u7523\u56de\u6570\")\n            \n            if preg_count is not None and preg_count != \"\" and pd.notna(preg_count):\n                try:\n                    if float(preg_count) > 0:\n                        errors.append({\n                            \"\u30d5\u30a1\u30a4\u30eb\u540d\": filename,\n                            \"\u30ab\u30eb\u30c6\u756a\u53f7\": karte_no,\n                            \"\u30a8\u30e9\u30fc\u306e\u5206\u985e\": \"\u767b\u9332\u6642\u60c5\u5831 (\u598a\u5a20\u30fb\u51fa\u7523)\",\n                            \"\u9805\u76ee/\u5bfe\u8c61\": \"\u6027\u5225\u3068\u598a\u5a20\u6b74\u306e\u77db\u76fe\",\n                            \"\u691c\u51fa\u3055\u308c\u305f\u5024\": f\"\u6027\u5225: \u7537 / \u598a\u5a20\u56de\u6570: {preg_count}\",\n                            \"\u30a8\u30e9\u30fc\u30e1\u30c3\u30bb\u30fc\u30b8\": f\"\u7537\u6027\u60a3\u8005\u306b\u598a\u5a20\u56de\u6570 {preg_count} \u56de\u304c\u767b\u9332\u3055\u308c\u3066\u3044\u307e\u3059\u3002\"\n                        })\n                except ValueError:\n                    pass\n                    \n            if birth_count is not None and birth_count != \"\" and pd.notna(birth_count):\n                try:\n                    if float(birth_count) > 0:\n                        errors.append({\n                            \"\u30d5\u30a1\u30a4\u30eb\u540d\": filename,\n                            \"\u30ab\u30eb\u30c6\u756a\u53f7\": karte_no,\n                            \"\u30a8\u30e9\u30fc\u306e\u5206\u985e\": \"\u767b\u9332\u6642\u60c5\u5831 (\u598a\u5a20\u30fb\u51fa\u7523)\",\n                            \"\u9805\u76ee/\u5bfe\u8c61\": \"\u6027\u5225\u3068\u51fa\u7523\u6b74\u306e\u77db\u76fe\",\n                            \"\u691c\u51fa\u3055\u308c\u305f\u5024\": f\"\u6027\u5225: \u7537 / \u51fa\u7523\u56de\u6570: {birth_count}\",\n                            \"\u30a8\u30e9\u30fc\u30e1\u30c3\u30bb\u30fc\u30b8\": f\"\u7537\u6027\u60a3\u8005\u306b\u51fa\u7523\u56de\u6570 {birth_count} \u56de\u304c\u767b\u9332\u3055\u308c\u3066\u3044\u307e\u3059\u3002\"\n                        })\n                except ValueError:\n                    pass\n\n        # --- 3. \u672c\u4eba\u306e\u6027\u5225\u3068\u30b5\u30fc\u30d9\u30a4\u30e9\u30f3\u30b9\uff08\u691c\u67fb\uff09\u306e\u77db\u76fe (\u30b5\u30fc\u30d9\u30a4\u30e9\u30f3\u30b9) ---\n        surveillances = parsed.get(\"\u30b5\u30fc\u30d9\u30a4\u30e9\u30f3\u30b9\", [])\n        for surv in surveillances:\n            exam_type = surv.get(\"\u691c\u67fb\u7a2e\u5225\", \"\")\n            if gender == \"\u7537\":\n                matched_female_proc = [fp for fp in FEMALE_PROCEDURES if fp in exam_type]\n                if matched_female_proc:\n                    errors.append({\n                        \"\u30d5\u30a1\u30a4\u30eb\u540d\": filename,\n                        \"\u30ab\u30eb\u30c6\u756a\u53f7\": karte_no,\n                        \"\u30a8\u30e9\u30fc\u306e\u5206\u985e\": \"\u30b5\u30fc\u30d9\u30a4\u30e9\u30f3\u30b9\",\n                        \"\u9805\u76ee/\u5bfe\u8c61\": \"\u6027\u5225\u3068\u691c\u67fb\u306e\u77db\u76fe\",\n                        \"\u691c\u51fa\u3055\u308c\u305f\u5024\": f\"\u6027\u5225: \u7537 / \u691c\u67fb\u7a2e\u5225: {exam_type}\",\n                        \"\u30a8\u30e9\u30fc\u30e1\u30c3\u30bb\u30fc\u30b8\": f\"\u7537\u6027\u60a3\u8005\u306b\u5973\u6027\u7279\u6709\u306e\u691c\u67fb\u300c{exam_type}\u300d\u304c\u767b\u9332\u3055\u308c\u3066\u3044\u307e\u3059\u3002\"\n                    })\n\n        # --- 4. \u767b\u9332\u7968\u306e\u5b50\u5bae\u5168\u6458\u7406\u7531\u306a\u3069\u306e\u77db\u76fe (\u767b\u9332\u7968) ---\n        if gender == \"\u7537\":\n            for k, v in parsed[\"\u767b\u9332\u7968\"].items():\n                if \"\u5b50\u5bae\u5168\u6458\" in k and v is not None and str(v).strip() != \"\" and pd.notna(v):\n                    errors.append({\n                        \"\u30d5\u30a1\u30a4\u30eb\u540d\": filename,\n                        \"\u30ab\u30eb\u30c6\u756a\u53f7\": karte_no,\n                        \"\u30a8\u30e9\u30fc\u306e\u5206\u985e\": \"\u767b\u9332\u7968\",\n                        \"\u9805\u76ee/\u5bfe\u8c61\": \"\u6027\u5225\u3068\u5b50\u5bae\u5168\u6458\u60c5\u5831\u306e\u77db\u76fe\",\n                        \"\u691c\u51fa\u3055\u308c\u305f\u5024\": f\"\u6027\u5225: \u7537 / {k}: {v}\",\n                        \"\u30a8\u30e9\u30fc\u30e1\u30c3\u30bb\u30fc\u30b8\": f\"\u7537\u6027\u60a3\u8005\u306b\u5b50\u5bae\u5168\u6458\u95a2\u9023\u60c5\u5831\uff08{k}: {v}\uff09\u304c\u767b\u9332\u3055\u308c\u3066\u3044\u307e\u3059\u3002\"\n                    })\n\n        # --- 5. \u5bb6\u7cfb\u60c5\u5831\u306e\u77db\u76fe (\u5bb6\u7cfb\u60c5\u5831) ---\n        family = parsed.get(\"\u5bb6\u7cfb\u60c5\u5831\", [])\n        for fam in family:\n            relation = fam.get(\"\u95a2\u4fc2\", \"\")\n            f_gender = fam.get(\"\u6027\u5225\", \"\")\n            diseases = fam.get(\"\u75be\u60a3\u4e00\u89a7\", [])\n            \n            # \u95a2\u4fc2\u3068\u6027\u5225\u306e\u77db\u76fe\n            if relation in MALE_RELATIONS and f_gender in [\"F\", \"\u5973\"]:\n                errors.append({\n                    \"\u30d5\u30a1\u30a4\u30eb\u540d\": filename,\n                    \"\u30ab\u30eb\u30c6\u756a\u53f7\": karte_no,\n                    \"\u30a8\u30e9\u30fc\u306e\u5206\u985e\": \"\u5bb6\u7cfb\u60c5\u5831\",\n                    \"\u9805\u76ee/\u5bfe\u8c61\": \"\u95a2\u4fc2\u3068\u6027\u5225\u306e\u77db\u76fe\",\n                    \"\u691c\u51fa\u3055\u308c\u305f\u5024\": f\"\u95a2\u4fc2: {relation} / \u6027\u5225: {f_gender}\",\n                    \"\u30a8\u30e9\u30fc\u30e1\u30c3\u30bb\u30fc\u30b8\": f\"\u5bb6\u7cfb\u60c5\u5831\u306b\u304a\u3044\u3066\u3001\u7537\u6027\u306e\u7d9a\u67c4\u300c{relation}\u300d\u306e\u6027\u5225\u304c\u300c\u5973\u6027({f_gender})\u300d\u3068\u3057\u3066\u767b\u9332\u3055\u308c\u3066\u3044\u307e\u3059\u3002\"\n                })\n            elif relation in FEMALE_RELATIONS and f_gender in [\"M\", \"\u7537\"]:\n                errors.append({\n                    \"\u30d5\u30a1\u30a4\u30eb\u540d\": filename,\n                    \"\u30ab\u30eb\u30c6\u756a\u53f7\": karte_no,\n                    \"\u30a8\u30e9\u30fc\u306e\u5206\u985e\": \"\u5bb6\u7cfb\u60c5\u5831\",\n                    \"\u9805\u76ee/\u5bfe\u8c61\": \"\u95a2\u4fc2\u3068\u6027\u5225\u306e\u77db\u76fe\",\n                    \"\u691c\u51fa\u3055\u308c\u305f\u5024\": f\"\u95a2\u4fc2: {relation} / \u6027\u5225: {f_gender}\",\n                    \"\u30a8\u30e9\u30fc\u30e1\u30c3\u30bb\u30fc\u30b8\": f\"\u5bb6\u7cfb\u60c5\u5831\u306b\u304a\u3044\u3066\u3001\u5973\u6027\u306e\u7d9a\u67c4\u300c{relation}\u300d\u306e\u6027\u5225\u304c\u300c\u7537\u6027({f_gender})\u300d\u3068\u3057\u3066\u767b\u9332\u3055\u308c\u3066\u3044\u307e\u3059\u3002\"\n                })\n                \n            # \u8840\u7e01\u8005\u306e\u6027\u5225\u3068\u75be\u60a3\u306e\u4e0d\u6574\u5408\n            # \u6027\u5225\u304cM\uff08\u7537\uff09\u307e\u305f\u306f\u7d9a\u67c4\u304c\u7537\u6027\u3067\u3001\u6027\u5225\u304c\u7a7a/\u7537\u6027\u306e\u5834\u5408\n            is_male_member = f_gender in [\"M\", \"\u7537\"] or (f_gender == \"\" and relation in MALE_RELATIONS)\n            is_female_member = f_gender in [\"F\", \"\u5973\"] or (f_gender == \"\" and relation in FEMALE_RELATIONS)\n            \n            for dis in diseases:\n                dis_name = dis.get(\"\u75c5\u540d\", \"\")\n                \n                if is_male_member:\n                    matched_female_dis = [fd for fd in FEMALE_DISEASES if fd in dis_name]\n                    if matched_female_dis:\n                        errors.append({\n                            \"\u30d5\u30a1\u30a4\u30eb\u540d\": filename,\n                            \"\u30ab\u30eb\u30c6\u756a\u53f7\": karte_no,\n                            \"\u30a8\u30e9\u30fc\u306e\u5206\u985e\": \"\u5bb6\u7cfb\u60c5\u5831\",\n                            \"\u9805\u76ee/\u5bfe\u8c61\": \"\u8840\u7e01\u8005\u306e\u6027\u5225\u3068\u75c5\u540d\u306e\u77db\u76fe\",\n                            \"\u691c\u51fa\u3055\u308c\u305f\u5024\": f\"\u95a2\u4fc2: {relation} (\u6027\u5225: {f_gender or '\u7537'}) / \u75c5\u540d: {dis_name}\",\n                            \"\u30a8\u30e9\u30fc\u30e1\u30c3\u30bb\u30fc\u30b8\": f\"\u5bb6\u7cfb\u60c5\u5831\u306b\u304a\u3044\u3066\u3001\u7537\u6027\u306e\u8840\u7e01\u8005\u300c{relation}\u300d\u306b\u5973\u6027\u7279\u6709\u306e\u75be\u60a3\u300c{dis_name}\u300d\u304c\u767b\u9332\u3055\u308c\u3066\u3044\u307e\u3059\u3002\"\n                        })\n                elif is_female_member:\n                    matched_male_dis = [md for md in MALE_DISEASES if md in dis_name]\n                    if matched_male_dis:\n                        errors.append({\n                            \"\u30d5\u30a1\u30a4\u30eb\u540d\": filename,\n                            \"\u30ab\u30eb\u30c6\u756a\u53f7\": karte_no,\n                            \"\u30a8\u30e9\u30fc\u306e\u5206\u985e\": \"\u5bb6\u7cfb\u60c5\u5831\",\n                            \"\u9805\u76ee/\u5bfe\u8c61\": \"\u8840\u7e01\u8005\u306e\u6027\u5225\u3068\u75c5\u540d\u306e\u77db\u76fe\",\n                            \"\u691c\u51fa\u3055\u308c\u305f\u5024\": f\"\u95a2\u4fc2: {relation} (\u6027\u5225: {f_gender or '\u5973'}) / \u75c5\u540d: {dis_name}\",\n                            \"\u30a8\u30e9\u30fc\u30e1\u30c3\u30bb\u30fc\u30b8\": f\"\u5bb6\u7cfb\u60c5\u5831\u306b\u304a\u3044\u3066\u3001\u5973\u6027\u306e\u8840\u7e01\u8005\u300c{relation}\u300d\u306b\u7537\u6027\u7279\u6709\u306e\u75be\u60a3\u300c{dis_name}\u300d\u304c\u767b\u9332\u3055\u308c\u3066\u3044\u307e\u3059\u3002\"\n                        })\n\n    return pd.DataFrame(errors) if errors else pd.DataFrame(columns=[\"\u30d5\u30a1\u30a4\u30eb\u540d\", \"\u30ab\u30eb\u30c6\u756a\u53f7\", \"\u30a8\u30e9\u30fc\u306e\u5206\u985e\", \"\u9805\u76ee/\u5bfe\u8c61\", \"\u691c\u51fa\u3055\u308c\u305f\u5024\", \"\u30a8\u30e9\u30fc\u30e1\u30c3\u30bb\u30fc\u30b8\"])\n",
          "sample_normal.xlsx": normalXlsx,
          "sample_error_male.xlsx": errorMaleXlsx,
          "sample_error_female.xlsx": errorFemaleXlsx
        }
      }, document.getElementById("root")).catch(function(err) {
        const errDiv = document.getElementById("error-display");
        const descDiv = document.getElementById("loading-desc");
        if (errDiv) {
          errDiv.style.display = "block";
          errDiv.innerText = "stliteマウントエラー:\n" + err.message + "\n\nStack: " + err.stack;
        }
        if (descDiv) {
          descDiv.innerHTML = "<span style='color:#ff4b2b; font-weight:bold;'>起動エラー</span>";
        }
      });
    </script>
